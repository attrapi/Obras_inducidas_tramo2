var layers=[],markers=[];
function getColor(p){return colorMap[p]||'#888'}

function buildLegend(){
var c=document.getElementById('legend-items');
var counts={};obras.forEach(function(o){counts[o.proyecto]=(counts[o.proyecto]||0)+1});
Object.entries(counts).sort(function(a,b){return b[1]-a[1]}).forEach(function(e){
var d=document.createElement('div');d.className='legend-item';
var s=lineTypes.indexOf(e[0])!==-1?'<div class="legend-line" style="background:'+getColor(e[0])+'"></div>':'<div class="legend-dot" style="background:'+getColor(e[0])+'"></div>';
d.innerHTML=s+'<span class="legend-text">'+e[0]+'</span><span class="legend-count">'+e[1]+'</span>';
d.onclick=function(){document.getElementById('filter-proyecto').value=e[0];applyFilters()};
c.appendChild(d);
});
}

function buildFilters(){
[...new Set(obras.map(function(o){return o.proyecto}))].sort().forEach(function(p){
var o=document.createElement('option');o.value=p;o.textContent=p;document.getElementById('filter-proyecto').appendChild(o)});
[...new Set(obras.map(function(o){return o.ente}))].sort().forEach(function(e){
var o=document.createElement('option');o.value=e;o.textContent=e;document.getElementById('filter-ente').appendChild(o)});
[...new Set(obras.map(function(o){return o.municipio}))].sort().forEach(function(m){
var b=document.createElement('span');b.className='badge active';b.textContent=m;b.dataset.municipio=m;
b.onclick=function(){this.classList.toggle('active');applyFilters()};
document.getElementById('municipio-badges').appendChild(b);
});
}

function fmtNum(n){return n?Number(n).toLocaleString('es-MX',{minimumFractionDigits:2,maximumFractionDigits:2}):'--'}

function showInfo(o){
document.getElementById('info-title').textContent=o.proyecto+' - '+o.ente;
document.getElementById('info-id').textContent=o.id;
var b=document.getElementById('info-body');
var rc=o.riesgo==='ALTO'?'alto':o.riesgo==='MEDIO'?'medio':'bajo';
var cc=o.criticidad==='SI'?'critico':'bajo';
var ec=estatusClass[o.estatus]||'estatus-identificada';
b.innerHTML='<div class="info-row"><span class="info-key">Estatus</span><span class="info-val"><span class="estatus-badge '+ec+'">'+o.estatus+'</span></span></div>'
+'<div class="info-row"><span class="info-key">Municipio</span><span class="info-val">'+o.municipio+'</span></div>'
+'<div class="info-row"><span class="info-key">PK</span><span class="info-val">'+o.pk_ini+' a '+o.pk_fin+'</span></div>'

+'<div class="info-row"><span class="info-key">Tipo obra</span><span class="info-val">'+o.tipo_obra+'</span></div>'
+'<div class="info-row"><span class="info-key">Criticidad</span><span class="info-val '+cc+'">'+o.criticidad+'</span></div>'
+'<div class="info-row"><span class="info-key">Riesgo</span><span class="info-val '+rc+'">'+o.riesgo+'</span></div>'

function closeInfo(){document.getElementById('overlay').classList.remove('active')}
function clearMap(){layers.forEach(function(l){map.removeLayer(l)});markers.forEach(function(m){map.removeLayer(m)});layers=[];markers=[]}

function applyFilters(){
clearMap();
var fp=document.getElementById('filter-proyecto').value;
var fe=document.getElementById('filter-ente').value;
var fc=document.getElementById('filter-criticidad').value;
var fr=document.getElementById('filter-riesgo').value;
var fst=document.getElementById('filter-estatus').value;
var am=[];document.querySelectorAll('#municipio-badges .badge.active').forEach(function(b){am.push(b.dataset.municipio)});

var f=obras.filter(function(o){
if(fp!=='TODOS'&&o.proyecto!==fp)return false;
if(fe!=='TODOS'&&o.ente!==fe)return false;
if(fc!=='TODOS'&&o.criticidad!==fc)return false;
if(fr!=='TODOS'&&o.riesgo!==fr)return false;
if(fst!=='TODOS'&&o.estatus!==fst)return false;
if(am.indexOf(o.municipio)===-1)return false;
return true;
});

document.getElementById('total-count').textContent=f.length;
document.getElementById('critico-count').textContent=f.filter(function(o){return o.criticidad==='SI'}).length;

f.forEach(function(o){
var c=getColor(o.proyecto),cr=o.criticidad==='SI';
var il=(o.lat_ini!==o.lat_fin||o.lon_ini!==o.lon_fin);
if(il){
var ln=L.polyline([[o.lat_ini,o.lon_ini],[o.lat_fin,o.lon_fin]],{color:c,weight:cr?4:2.5,opacity:0.85,dashArray:cr?null:'5 5'}).addTo(map);
ln.on('click',function(){showInfo(o)});layers.push(ln);
var a=L.circleMarker([o.lat_ini,o.lon_ini],{radius:cr?5:3,fillColor:c,color:'#fff',weight:1.5,fillOpacity:0.9}).addTo(map);
var b=L.circleMarker([o.lat_fin,o.lon_fin],{radius:cr?5:3,fillColor:c,color:'#fff',weight:1.5,fillOpacity:0.9}).addTo(map);
a.on('click',function(){showInfo(o)});b.on('click',function(){showInfo(o)});
markers.push(a);markers.push(b);
}else{
var m=L.circleMarker([o.lat_ini,o.lon_ini],{radius:cr?7:5,fillColor:c,color:cr?'#e53935':'rgba(0,0,0,0.3)',weight:cr?2.5:1,fillOpacity:0.9}).addTo(map);
m.on('click',function(){showInfo(o)});markers.push(m);
}
});

if(f.length>0){
var bn=[];f.forEach(function(o){bn.push([o.lat_ini,o.lon_ini]);if(o.lat_ini!==o.lat_fin||o.lon_ini!==o.lon_fin)bn.push([o.lat_fin,o.lon_fin])});
map.fitBounds(bn,{padding:[100,100]});
}
}
